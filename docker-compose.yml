services:
  scheduler:
    build: .
    container_name: scheduler
    restart: unless-stopped
    environment:
      - APP_VERSION=${APP_VERSION}
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2

    command: uv run python -m app.main

  notifier:
    build: .
    container_name: notifier
    environment:
      - SERVICE_TYPE=consumer
      - APP_VERSION=${APP_VERSION}
    deploy:
      restart_policy:
        condition: on-failure
        max_attempts: 2
    command: uv run python -m app.main
